        <polyline points="0,260.5 20,266.1 40,262.8 60,259.4 80,261.6 100,265.0 120,258.2 140,260.5 160,266.1 180,262.8 200,259.4 220,261.6 240,265.0 260,258.2 280,260.5 300,266.1 320,262.8 340,259.4 360,261.6 380,265.0 400,258.2 420,260.5 440,266.1 460,262.8 480,259.4 500,261.6 520,265.0 540,258.2 560,260.5 580,266.1 600,262.8 620,259.4 640,261.6 660,265.0 680,258.2 700,260.5 720,266.1 740,262.8 760,259.4 780,261.6 800,265.0 820,258.2 840,260.5" fill="none" stroke="#F87171" stroke-width="1.8"/>
      </g>
    </g>
  </g>

