<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <style>
    /* 三态数值轮换（9 秒周期，每态 3 秒） */
    .s1{animation:k1 9s steps(1) infinite}
    .s2{animation:k2 9s steps(1) infinite}
    .s3{animation:k3 9s steps(1) infinite}
    @keyframes k1{0%,32.9%{opacity:1}33%,100%{opacity:0}}
    @keyframes k2{0%,32.9%{opacity:0}33%,65.9%{opacity:1}66%,100%{opacity:0}}
    @keyframes k3{0%,65.9%{opacity:0}66%,100%{opacity:1}}
    /* 四条字幕轮播（10 秒周期，每条 2.5 秒） */
    .c1{animation:cap1 10s steps(1) infinite}
    .c2{animation:cap2 10s steps(1) infinite}
    .c3{animation:cap3 10s steps(1) infinite}
    .c4{animation:cap4 10s steps(1) infinite}
    @keyframes cap1{0%,24.9%{opacity:1}25%,100%{opacity:0}}
    @keyframes cap2{0%,24.9%{opacity:0}25%,49.9%{opacity:1}50%,100%{opacity:0}}
    @keyframes cap3{0%,49.9%{opacity:0}50%,74.9%{opacity:1}75%,100%{opacity:0}}
    @keyframes cap4{0%,74.9%{opacity:0}75%,100%{opacity:1}}
    /* 曲线滚动与报文上翻 */
    .scroll{animation:sc 4s linear infinite}
    @keyframes sc{from{transform:translateX(0)}to{transform:translateX(-140px)}}
    .logroll{animation:lg 6s linear infinite}
    @keyframes lg{from{transform:translateY(0)}to{transform:translateY(-132px)}}
    .blink{animation:bl 2s steps(1) infinite}
    @keyframes bl{0%,74.9%{opacity:1}75%,100%{opacity:.35}}
  </style>

  <!-- 底色与外框 -->
  <rect width="820" height="470" rx="10" fill="#111827"/>

  <!-- 顶栏 -->
  <rect x="0" y="0" width="820" height="42" rx="10" fill="#1F4E79"/>
  <rect x="0" y="21" width="820" height="21" fill="#1F4E79"/>
  <text x="18" y="27" font-size="16" font-weight="bold" fill="#FFFFFF">DL/T645 电能表主站</text>
  <rect x="208" y="10" width="150" height="22" rx="11" fill="#173A5C"/>
  <text x="283" y="25" font-size="11" fill="#9DB8D4" text-anchor="middle">DL/T645-2007 · RS485</text>
  <circle cx="676" cy="21" r="5" fill="#4ADE80" class="blink"/>
  <text x="688" y="26" font-size="12" fill="#E5E7EB">已连接 · 轮询中</text>

  <!-- 电参数卡片行 -->
  <g>
