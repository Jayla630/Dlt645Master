    <text x="44" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s1">13.26</text>
    <text x="44" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s2" opacity="0">13.29</text>
    <text x="44" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s3" opacity="0">13.32</text>
    <text x="44" y="136" font-size="10" fill="#6B7280">kWh · 单调走字</text>

    <rect x="172" y="56" width="130" height="96" rx="6" fill="#1F2937"/>
    <rect x="172" y="56" width="4" height="96" rx="2" fill="#FACC15"/>
    <text x="186" y="78" font-size="11" fill="#9CA3AF">A 相电压</text>
    <text x="186" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s1">222.5</text>
    <text x="186" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s2" opacity="0">221.8</text>
    <text x="186" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s3" opacity="0">222.9</text>
    <text x="186" y="136" font-size="10" fill="#6B7280">V</text>

