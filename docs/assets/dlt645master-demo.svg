    <text x="328" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s2" opacity="0">220.1</text>
    <text x="328" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s3" opacity="0">219.7</text>
    <text x="328" y="136" font-size="10" fill="#6B7280">V</text>

    <rect x="456" y="56" width="130" height="96" rx="6" fill="#1F2937"/>
    <rect x="456" y="56" width="4" height="96" rx="2" fill="#F87171"/>
    <text x="470" y="78" font-size="11" fill="#9CA3AF">C 相电压</text>
    <text x="470" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s1">221.2</text>
    <text x="470" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s2" opacity="0">220.6</text>
    <text x="470" y="112" font-size="22" fill="#FFFFFF" text-anchor="start" font-family="Consolas,monospace" font-weight="bold" class="s3" opacity="0">221.5</text>
    <text x="470" y="136" font-size="10" fill="#6B7280">V</text>
  </g>

